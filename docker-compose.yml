services:
  db:
    image: groonga/pgroonga:latest-alpine-16
    container_name: casequery-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-casequery}
      POSTGRES_USER: ${POSTGRES_USER:-casequery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casequery_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casequery} -d ${POSTGRES_DB:-casequery}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: casequery-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-casequery}:${POSTGRES_PASSWORD:-casequery_password}@db:5432/${POSTGRES_DB:-casequery}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: casequery-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: casequery-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
